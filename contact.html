      <div class="section-label">05 — Contact</div>
      <h1>Contactez-<span class="accent">moi</span></h1>
    </div>

    <div class="section">
      <p class="contact-sub reveal">Une question, une opportunité de stage ? N'hésitez pas !</p>

      <form id="contact-form" class="contact-form reveal" action="https://formspree.io/f/VOTRE_ID" method="POST">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Votre Nom</label>
            <input type="text" id="name" name="name" placeholder="Jean Dupont" required>
          </div>
          <div class="form-group">
            <label for="email">Votre Email</label>
            <input type="email" id="email" name="email" placeholder="jean@exemple.fr" required>
          </div>
        </div>
        <div class="form-group">
          <label for="message">Votre Message</label>
          <textarea id="message" name="message" placeholder="Bonjour, je souhaite..." rows="6" required></textarea>
        </div>
        <button type="submit" class="btn-submit">
          <span>Envoyer le message</span> <span class="icon">→</span>
        </button>
        <p class="form-notice" id="form-notice"></p>
      </form>
    </div>
  </div>
